name: Release

# Manual trigger, or every push to main. Version is auto-derived (see below).
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write # needed to create the tag + release

env:
  # ponytail: CalVer-ish auto version; bump the "1.0" prefix by hand for real releases.
  VERSION: 1.0.${{ github.run_number }}

jobs:
  # Step 1: create the tag + (empty) release up front.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true

  # Step 2: each platform builds, then uploads its file to the existing release.
  # softprops/action-gh-release appends files when the tag already exists.
  # Phone/tablet APK (mobile flavor).
  android:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      # ponytail: release APK is debug-signed -> installable for sideloading, not Play Store.
      - run: flutter build apk --release --flavor mobile -t lib/main.dart --build-name=$VERSION --build-number=${{ github.run_number }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: build/app/outputs/flutter-apk/app-mobile-release.apk

  # Android TV APK (tv flavor, Leanback launcher, D-pad UI).
  android_tv:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      - run: flutter build apk --release --flavor tv -t lib/main_tv.dart --build-name=$VERSION --build-number=${{ github.run_number }}
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: build/app/outputs/flutter-apk/app-tv-release.apk

  ios:
    needs: release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      # ponytail: unsigned IPA (no Apple cert in CI). Hand-package .app into Payload/.
      # Add code-signing secrets + `flutter build ipa --export-options-plist` for the App Store.
      - run: flutter build ios --release --no-codesign --build-name=$VERSION --build-number=${{ github.run_number }}
      # Ad-hoc sign so the Mach-O has a well-formed signature/__LINKEDIT. Without this,
      # SideStore/ldid hits "_assert(): end >= size - 0x10" re-signing Flutter binaries.
      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - build/ios/iphoneos/Runner.app
      - name: Package IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qr app-release.ipa Payload
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          files: build/ios/iphoneos/app-release.ipa
