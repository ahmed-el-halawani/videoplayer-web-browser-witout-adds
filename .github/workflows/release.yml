name: Release

# Manual trigger, or every push to main. Version is auto-derived (see below).
on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write # needed to create the tag + release

env:
  # ponytail: CalVer-ish auto version; bump the "1.0" prefix by hand for real releases.
  VERSION: 1.0.${{ github.run_number }}

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      # ponytail: release APK is debug-signed -> installable for sideloading, not Play Store.
      - run: flutter build apk --release --build-name=$VERSION --build-number=${{ github.run_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with: { channel: stable }
      - run: flutter pub get
      # ponytail: unsigned IPA (no Apple cert in CI). Hand-package .app into Payload/.
      # Add code-signing secrets + `flutter build ipa --export-options-plist` for the App Store.
      - run: flutter build ios --release --no-codesign --build-name=$VERSION --build-number=${{ github.run_number }}
      - name: Package unsigned IPA
        run: |
          cd build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -qr app-release.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ipa
          path: build/ios/iphoneos/app-release.ipa

  release:
    needs: [android, ios]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with: { path: dist }
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: true
          files: |
            dist/apk/app-release.apk
            dist/ipa/app-release.ipa
